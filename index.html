<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeon Explorer - FPS Controller</title>

    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="data:,">

    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.164.1",
          "three/addons/": "https://esm.sh/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>

    <!-- 🌀 LOADING SCREEN -->
    <div id="loading-screen" style="display:none;">
      <div class="spinner"></div>
      <p id="loading-label">Caricamento dungeon...</p>
      <div id="loading-bar-wrap">
        <div id="loading-bar-fill"></div>
      </div>
      <p id="loading-percent">0%</p>
    </div>

    <!-- 🏠 HOME SCREEN -->
    <div id="home-screen">
      <div id="home-content">
        <h1 id="home-title">Dungeon Explorer</h1>
        <div class="menu-buttons">
          <button id="btn-start1" class="home-btn">Start Game</button>
          <button id="btn-exit1" class="home-btn home-btn--secondary">Exit</button>
        </div>
      </div>
    </div>

    <div id="win-screen">
      <div id="win-content">
        <h1 id="win-title">YOU WIN</h1>
        <div class="menu-buttons">
          <button id="btn-start2" class="home-btn">Start a new Game</button>
          <button id="btn-exit2" class="home-btn home-btn--secondary">Exit</button>
        </div>
      </div>
    </div>

    <!-- 🎯 UI GAME -->
    <div id="crosshair"></div>

    <div id="damage-vignette"></div>

    <div id="noclip-hud" style="
      display: none; position: fixed; top: 12px; right: 16px;
      background: rgba(220,50,0,0.85); color: #fff;
      font-family: monospace; font-size: 13px; font-weight: bold;
      padding: 4px 10px; border-radius: 4px; z-index: 9999;
      pointer-events: none;">
      👻 NOCLIP &nbsp;[C per disattivare]
    </div>

    <!-- 🎮 GAME SCRIPT -->
    <script type="module" src="./js/core/main.js"></script>

  </body>
</html>
